<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">ecsly API story card</title>
  <desc id="desc">A simple diagram of the ecsly API model: world, components, commands, flush, queries, systems.</desc>
  <rect width="1280" height="720" rx="48" fill="#f7fdff"/>
  <text x="76" y="104" font-family="Nunito, Avenir Next, sans-serif" font-size="58" font-weight="900" fill="#0b4558">ecsly API story</text>
  <text x="76" y="154" font-family="Nunito, Avenir Next, sans-serif" font-size="27" font-weight="650" fill="#55717b">Small surface, explicit structural changes, data-first simulation.</text>
  <g font-family="Nunito, Avenir Next, sans-serif">
    <rect x="86" y="246" width="180" height="104" rx="28" fill="#d8f6ff"/>
    <text x="124" y="290" font-size="24" font-weight="850" fill="#06495d">World</text>
    <text x="124" y="322" font-size="19" fill="#466774">owns state</text>
    <rect x="326" y="246" width="204" height="104" rx="28" fill="#ffffff" stroke="#aeeafa" stroke-width="3"/>
    <text x="364" y="290" font-size="24" font-weight="850" fill="#06495d">Components</text>
    <text x="364" y="322" font-size="19" fill="#466774">plain data</text>
    <rect x="590" y="246" width="190" height="104" rx="28" fill="#ffffff" stroke="#aeeafa" stroke-width="3"/>
    <text x="628" y="290" font-size="24" font-weight="850" fill="#06495d">Commands</text>
    <text x="628" y="322" font-size="19" fill="#466774">queued edits</text>
    <rect x="840" y="246" width="142" height="104" rx="28" fill="#fff5d5"/>
    <text x="878" y="290" font-size="24" font-weight="850" fill="#6a4d00">Flush</text>
    <text x="878" y="322" font-size="19" fill="#70633e">apply</text>
    <rect x="1042" y="246" width="152" height="104" rx="28" fill="#dff7ef"/>
    <text x="1080" y="290" font-size="24" font-weight="850" fill="#075540">Query</text>
    <text x="1080" y="322" font-size="19" fill="#466774">iterate</text>
    <path d="M266 298H326M530 298H590M780 298H840M982 298H1042" stroke="#16b8d8" stroke-width="7" stroke-linecap="round"/>
    <path d="M1038 360C994 464 888 516 720 516H284" fill="none" stroke="#73d3e8" stroke-width="7" stroke-linecap="round" stroke-dasharray="14 18"/>
    <rect x="420" y="466" width="440" height="112" rx="32" fill="#062b38"/>
    <text x="462" y="512" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#8ce8ff">schedule.add(system)</text>
    <text x="462" y="550" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#f7f9fb">systems mutate data, not hosts</text>
  </g>
</svg>
