<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">ecsly performance card</title>
  <desc id="desc">A compact visual explaining object components, extension facades, and SIMD-friendly columns in ecsly.</desc>
  <rect width="1280" height="720" rx="48" fill="#f6fcff"/>
  <text x="76" y="104" font-family="Nunito, Avenir Next, sans-serif" font-size="56" font-weight="900" fill="#0b4558">Start simple. Move hot data later.</text>
  <text x="76" y="154" font-family="Nunito, Avenir Next, sans-serif" font-size="27" font-weight="650" fill="#55717b">Object components for cold state. Extension facades and typed columns for hot loops.</text>
  <g font-family="Nunito, Avenir Next, sans-serif">
    <rect x="82" y="238" width="332" height="330" rx="36" fill="#ffffff" stroke="#d1edf5" stroke-width="3"/>
    <text x="126" y="302" font-size="30" font-weight="850" fill="#0b4558">Object component</text>
    <text x="126" y="348" font-size="22" fill="#55717b">Readable Dart objects</text>
    <text x="126" y="386" font-size="22" fill="#55717b">Great for simple state</text>
    <text x="126" y="424" font-size="22" fill="#55717b">Accepts normal GC tradeoffs</text>
    <rect x="126" y="466" width="214" height="54" rx="18" fill="#eaf8fc"/>
    <text x="148" y="501" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#075e73">Counter(value)</text>

    <rect x="474" y="238" width="332" height="330" rx="36" fill="#ffffff" stroke="#d1edf5" stroke-width="3"/>
    <text x="518" y="302" font-size="30" font-weight="850" fill="#0b4558">Extension facade</text>
    <text x="518" y="348" font-size="22" fill="#55717b">Field-like API</text>
    <text x="518" y="386" font-size="22" fill="#55717b">Backed by dense columns</text>
    <text x="518" y="424" font-size="22" fill="#55717b">Good migration step</text>
    <rect x="518" y="466" width="214" height="54" rx="18" fill="#eaf8fc"/>
    <text x="540" y="501" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#075e73">velocity.x += dt</text>

    <rect x="866" y="238" width="332" height="330" rx="36" fill="#062b38"/>
    <text x="910" y="302" font-size="30" font-weight="850" fill="#effcff">SIMD column</text>
    <text x="910" y="348" font-size="22" fill="#b9e5ee">stride 4 FloatColumn</text>
    <text x="910" y="386" font-size="22" fill="#b9e5ee">Float32x4 batch updates</text>
    <text x="910" y="424" font-size="22" fill="#b9e5ee">For repeated numeric work</text>
    <g transform="translate(910 466)">
      <rect width="50" height="54" rx="12" fill="#18b7d9"/><rect x="58" width="50" height="54" rx="12" fill="#18b7d9"/><rect x="116" width="50" height="54" rx="12" fill="#18b7d9"/><rect x="174" width="50" height="54" rx="12" fill="#ffd166"/>
      <text x="18" y="35" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#062b38">x</text>
      <text x="76" y="35" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#062b38">y</text>
      <text x="134" y="35" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#062b38">z</text>
      <text x="192" y="35" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#062b38">w</text>
    </g>
  </g>
  <path d="M414 403H474M806 403H866" stroke="#16b8d8" stroke-width="8" stroke-linecap="round"/>
</svg>
