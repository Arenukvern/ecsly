name: ecsly
description: "Experimental ECS core for Dart apps, including Flutter and Jaspr (early prerelease)."
homepage: https://pub.dev/packages/ecsly
documentation: https://pub.dev/documentation/ecsly/latest/
repository: https://github.com/Arenukvern/ecsly/tree/main/core_packages/ecsly
issue_tracker: https://github.com/Arenukvern/ecsly/issues
license: MIT
topics:
  - ecs
  - game-development
  - simulation
  - performance
  - dart
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

# Super-experimental early prerelease channel.
version: 0.0.1-dev.11+-dev.10

environment:
  sdk: ">=3.12.0 <4.0.0"

resolution: workspace
# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  directed_graph: ^0.5.0
  from_json_to_json: ^0.5.0
  meta: ^1.16.0
  # Keep ECS core pure Dart: no Flutter-engine transitive deps.

dev_dependencies:
  build_runner: ^2.7.1
  lints: ^6.0.0
  test: ^1.28.0
  xsoulspace_lints: ^0.1.2
# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec
