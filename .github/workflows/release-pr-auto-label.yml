name: Release PR auto-label

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - edited
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label:
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'release-please--') &&
      github.event.pull_request.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Add auto-approval label
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh label create agent-auto-approve \
            --repo "$REPO" \
            --description "Allow trusted agent approval after release validation passes" \
            --color "0e8a16" \
            --force
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label agent-auto-approve
