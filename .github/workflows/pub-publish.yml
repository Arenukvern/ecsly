name: Publish pub.dev package

on:
  push:
    tags:
      - 'ecsly-v*'
      - 'ecsly_app-v*'
      - 'ecsly_codegen-v*'
      - 'ecsly_flutter-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to preflight, for example ecsly-v0.0.1-dev.11'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: pub-dev-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pub.dev
    timeout-minutes: 30
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: dart-lang/setup-dart@v1

      - name: Workspace dependencies
        run: dart pub get

      - name: Release preflight
        run: dart tool/release/pub_package.dart --tag "$RELEASE_TAG" --skip-existing

      - name: Publish package
        if: github.event_name == 'push'
        run: dart tool/release/pub_package.dart --tag "$RELEASE_TAG" --execute --skip-existing
