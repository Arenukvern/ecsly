name: Release PR sync pubspec versions

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-pr-sync-pubspecs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-release-pr:
    runs-on: ubuntu-latest
    outputs:
      is_release_pr: ${{ steps.check.outputs.is_release_pr }}
    steps:
      - id: check
        name: Detect Release Please PR
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD: ${{ github.head_ref }}
        run: |
          title="$PR_TITLE"
          head="$PR_HEAD"
          if [[ "$head" == release-please--* ]] || [[ "$title" == *": release "* ]]; then
            echo "is_release_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_pr=false" >> "$GITHUB_OUTPUT"
          fi

  sync-pubspecs:
    needs: detect-release-pr
    if: needs.detect-release-pr.outputs.is_release_pr == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1

      - name: Sync pubspec versions from Release Please manifest
        run: dart tool/release/sync_release_pubspec_versions.dart

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- core_packages/*/pubspec.yaml; then
            echo "release pubspec versions already in sync"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add core_packages/*/pubspec.yaml
          git commit -m "chore: sync release pubspec versions"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
